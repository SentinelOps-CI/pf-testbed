name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

jobs:
  validate-workflow-integrity:
    name: Validate Workflow Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Validate workflow references
        run: python scripts/validate_workflow_references.py

  quality:
    name: Lint Typecheck Test
    runs-on: ubuntu-latest
    needs: validate-workflow-integrity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r testbed/tools/reporter/requirements.txt
      - name: Run quality checks
        run: npm run ci:verify
      - name: Validate retrieval contracts
        run: npm run retrieval:contract-check
      - name: Run reporter tests with coverage
        run: pytest testbed/tools/reporter/ --cov=testbed/tools/reporter --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          fail_ci_if_error: false

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Run security checks
        run: |
          npm run deps:check
          npm run security:test
          pip-audit -r requirements.txt
